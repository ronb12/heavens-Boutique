name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apply_database:
        description: "Apply database/schema.sql to Neon (even if no DB files changed)"
        required: false
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"

concurrency:
  group: deploy-heavens-boutique-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      # GitHub does not define GITHUB_REPOSITORY_NAME; scripts use set -u and must not reference it unbound.
      GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect database / script changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            database:
              - 'database/**'
              - 'scripts/neon-apply-schema.sh'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema to Neon
        if: |
          (github.event_name == 'push' && steps.changes.outputs.database == 'true') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_database == 'yes')
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEON_API_KEY:-}" ]; then
            echo "::warning::NEON_API_KEY is not set; skipping Neon schema apply."
            exit 0
          fi
          export NEON_PROJECT_ID="${NEON_PROJECT_ID:-withered-fog-14874911}"
          export NEON_BRANCH="${NEON_BRANCH:-production}"
          echo "Neon DDL (schema only if empty DB; else migrations only): project=$NEON_PROJECT_ID branch=$NEON_BRANCH"
          bash scripts/neon-apply-schema.sh

      # Match Vercel "Root Directory = ." (repo root). If the dashboard is set to `backend`
      # only, either switch Root Directory to "." here or deploy manually from backend/.
      - name: Prepare Vercel bundle at repo root
        run: |
          set -euo pipefail
          cp backend/package.json backend/package-lock.json .
          npm ci
          rm -rf api lib public
          cp -R backend/api api
          cp -R backend/lib lib
          mkdir -p public
          cp -R backend/public/. public/

      # Never commit .vercel/ — and do not echo-write project.json: current CLIs validate project
      # settings from the API; a minimal JSON triggers "Project Settings are invalid".
      - name: Deploy to Vercel (production)
        env:
          VERCEL_TELEMETRY_DISABLED: "1"
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE_VAR: ${{ vars.VERCEL_SCOPE }}
          VERCEL_PROJECT_SLUG_VAR: ${{ vars.VERCEL_PROJECT_SLUG }}
          # Only on this step — do NOT use job-level env: partial ORG/PROJECT breaks `vercel deploy` after link.
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is empty or not set. Add repository secret VERCEL_TOKEN (Vercel → Account Settings → Tokens)."
            exit 1
          fi
          rm -rf .vercel
          # Pin major for reproducibility; npm resolves to latest 50.x.
          VERCEL_PKG="vercel@50"

          # Repo slug: job env sets GITHUB_REPOSITORY_NAME (GitHub only provides GITHUB_REPOSITORY / _OWNER).
          REPO_SLUG_LOWER="$(echo -n "${GITHUB_REPOSITORY_NAME}" | tr '[:upper:]' '[:lower:]')"
          PROJ="$(echo -n "${VERCEL_PROJECT_SLUG_VAR:-$REPO_SLUG_LOWER}" | tr -d '[:space:]')"
          if [ -z "$PROJ" ]; then PROJ='heavens-boutique'; fi

          # Vercel CLI 50+ in --non-interactive mode requires --scope (or --team); it does not infer
          # a default. This repo's production project lives under team ronell-bradleys-projects.
          # Override with repository variable VERCEL_SCOPE if you use a different team.
          _scope_trim="$(echo -n "${VERCEL_SCOPE_VAR:-ronell-bradleys-projects}" | tr -d '[:space:]')"
          SCOPE_ARGS=(--scope "$_scope_trim")
          echo "Using Vercel scope (team): ${_scope_trim}"

          echo "Deploy target: project=$PROJ (repo_slug=$REPO_SLUG_LOWER)"

          if [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::notice::Using VERCEL_ORG_ID + VERCEL_PROJECT_ID from secrets; writing .vercel/project.json (Vercel CLI 50+ needs a linked project file, not env vars alone)."
            node -e "const fs=require('fs');const o=process.env.VERCEL_ORG_ID;const p=process.env.VERCEL_PROJECT_ID;if(!o||!p){console.error('missing org/project');process.exit(1)}fs.mkdirSync('.vercel',{recursive:true});fs.writeFileSync('.vercel/project.json',JSON.stringify({orgId:o,projectId:p},null,2)+'\n');"
            npx --yes "$VERCEL_PKG" deploy --prod --yes --non-interactive --archive=tgz \
              --token "$VERCEL_TOKEN" \
              "${SCOPE_ARGS[@]}"
          else
            # CLI reads these env vars during deploy; a lone VERCEL_ORG_ID triggers "forgot VERCEL_PROJECT_ID".
            unset VERCEL_ORG_ID VERCEL_PROJECT_ID
            # Non-interactive deploy with --project alone is brittle; link first writes .vercel/project.json.
            npx --yes "$VERCEL_PKG" link --yes --non-interactive \
              --token "$VERCEL_TOKEN" \
              "${SCOPE_ARGS[@]}" \
              --project "$PROJ"
            npx --yes "$VERCEL_PKG" deploy --prod --yes --non-interactive --archive=tgz \
              --token "$VERCEL_TOKEN" \
              "${SCOPE_ARGS[@]}"
          fi

      - name: Smoke test API (production)
        env:
          SMOKE_BASE: ${{ vars.VERCEL_SMOKE_BASE }}
          API_SMOKE_BASE: ${{ vars.VERCEL_API_SMOKE_BASE }}
        run: |
          set -euo pipefail
          # After splitting API vs Next storefront: set VERCEL_API_SMOKE_BASE to the API deployment
          # (e.g. https://heavens-boutique-api.vercel.app). Until then, defaults hit the storefront URL,
          # which resolves /api when BACKEND_PROXY_ORIGIN is set on that project.
          base="${API_SMOKE_BASE:-${SMOKE_BASE:-https://heavens-boutique.vercel.app}}"
          ok=0
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/hb-api-smoke.json -w "%{http_code}" "${base}/api/products" || echo "000")
            if [ "$code" = "200" ]; then
              ok=1
              break
            fi
            echo "Attempt $i: GET ${base}/api/products → HTTP $code (retrying in 12s…)"
            cat /tmp/hb-api-smoke.json 2>/dev/null || true
            sleep 12
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Expected GET ${base}/api/products → 200 after retries"
            exit 1
          fi
          echo "GET ${base}/api/products OK (200)"
          for path in "admin/promos" "admin/upload" "admin/reports" "admin/orders" "admin/customers"; do
            code=$(curl -sS -o /tmp/hb-admin-smoke.txt -w "%{http_code}" -X POST "${base}/api/${path}" -H "Content-Type: application/json" -d '{}' || echo "000")
            if [ "$code" = "404" ]; then
              echo "::error::POST ${base}/api/${path} returned 404 (route missing on deployment). Redeploy with a full build."
              cat /tmp/hb-admin-smoke.txt 2>/dev/null || true
              exit 1
            fi
            echo "POST ${base}/api/${path} → HTTP $code (expect not 404)"
          done

  # Next.js storefront (`web/`). Requires a separate Vercel project so it is not overwritten by the API bundle.
  # Repo variable: VERCEL_WEB_PROJECT_SLUG — when set, pushes to main also deploy production for `web/`.
  deploy-storefront:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ vars.VERCEL_WEB_PROJECT_SLUG != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (web/)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Deploy Next.js storefront to Vercel (production)
        env:
          VERCEL_TELEMETRY_DISABLED: "1"
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE_VAR: ${{ vars.VERCEL_SCOPE }}
          VERCEL_WEB_PROJECT_SLUG_VAR: ${{ vars.VERCEL_WEB_PROJECT_SLUG }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_WEB_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
        working-directory: web
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is empty or not set."
            exit 1
          fi
          npm ci
          VERCEL_PKG="vercel@50"
          _scope_trim="$(echo -n "${VERCEL_SCOPE_VAR:-ronell-bradleys-projects}" | tr -d '[:space:]')"
          SCOPE_ARGS=(--scope "$_scope_trim")
          WEB_PROJ="$(echo -n "${VERCEL_WEB_PROJECT_SLUG_VAR}" | tr -d '[:space:]')"
          if [ -z "$WEB_PROJ" ]; then
            echo "::error::VERCEL_WEB_PROJECT_SLUG is empty"
            exit 1
          fi
          rm -rf .vercel
          echo "Storefront deploy target (Next.js root = web/): project=$WEB_PROJ"

          if [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_WEB_PROJECT_ID:-}" ]; then
            echo "::notice::Using VERCEL_ORG_ID + VERCEL_WEB_PROJECT_ID for storefront."
            node -e "const fs=require('fs');const o=process.env.VERCEL_ORG_ID;const p=process.env.VERCEL_WEB_PROJECT_ID;if(!o||!p){console.error('missing org or VERCEL_WEB_PROJECT_ID');process.exit(1)}fs.mkdirSync('.vercel',{recursive:true});fs.writeFileSync('.vercel/project.json',JSON.stringify({orgId:o,projectId:p},null,2)+'\n');"
            npx --yes "$VERCEL_PKG" deploy --prod --yes --non-interactive \
              --token "$VERCEL_TOKEN" \
              "${SCOPE_ARGS[@]}"
          else
            unset VERCEL_WEB_PROJECT_ID
            npx --yes "$VERCEL_PKG" link --yes --non-interactive \
              --token "$VERCEL_TOKEN" \
              "${SCOPE_ARGS[@]}" \
              --project "$WEB_PROJ"
            npx --yes "$VERCEL_PKG" deploy --prod --yes --non-interactive \
              --token "$VERCEL_TOKEN" \
              "${SCOPE_ARGS[@]}"
          fi

      - name: Smoke test storefront (production)
        env:
          STORE_SMOKE_BASE: ${{ vars.VERCEL_STORE_SMOKE_BASE }}
        run: |
          set -euo pipefail
          root="${STORE_SMOKE_BASE:-https://heavens-boutique.vercel.app}"
          code=$(curl -sS -o /tmp/hb-root.txt -w "%{http_code}" "${root}/" || echo "000")
          if [ "$code" != "200" ]; then
            echo "::warning::GET ${root}/ returned HTTP $code (expected 200 once domain points at storefront project)."
            cat /tmp/hb-root.txt 2>/dev/null || true
            exit 0
          fi
          echo "GET ${root}/ OK"

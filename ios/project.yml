name: HeavensBoutique
attributes:
  ORGANIZATIONNAME: Heaven's Boutique

options:
  bundleIdPrefix: com.heavensboutique
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  StripePaymentSheet:
    url: https://github.com/stripe/stripe-ios-spm
    from: 24.0.0
targets:
  HeavensBoutique:
    type: application
    platform: iOS
    sources:
      - path: HeavensBoutique
        excludes:
          - "**/.DS_Store"
          # Entitlements must be CODE_SIGN_ENTITLEMENTS only — not Copy Bundle Resources.
          - "**/Entitlements-Debug.plist"
          - "**/Entitlements-Release.plist"
    settings:
      base:
        # Optional: only if you still use Cloudinary IDs in the catalog — admin preview URLs. Vercel Blob URLs need no client cloud name.
        CLOUDINARY_CLOUD_NAME: REPLACE_WITH_YOUR_CLOUD_NAME
        DEVELOPMENT_TEAM: 4SQJ3AH62S
        PRODUCT_BUNDLE_IDENTIFIER: com.heavensboutique.app
        PRODUCT_NAME: HeavensBoutique
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        CURRENT_PROJECT_VERSION: 7
        MARKETING_VERSION: "1.0"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: HeavensBoutique/Entitlements-Debug.plist
        Release:
          CODE_SIGN_ENTITLEMENTS: HeavensBoutique/Entitlements-Release.plist
    info:
      path: HeavensBoutique/Info.plist
      properties:
        CFBundleDisplayName: Heaven's Boutique
        CFBundleSpokenName: Heaven's Boutique
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 Heaven's Boutique. All rights reserved."
        UILaunchScreen: {}
        API_BASE_URL: https://heavens-boutique-api.vercel.app/api
        STOREFRONT_URL: https://heavens-boutique-web.vercel.app
        NSCameraUsageDescription: "Heaven's Boutique uses the camera when store admins take photos to add or update product images in the catalog."
        NSPhotoLibraryUsageDescription: Heaven's Boutique needs photo access to add product images to your catalog.
        STRIPE_PUBLISHABLE_KEY: pk_test_REPLACE_ME
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
      - package: StripePaymentSheet
        product: StripePaymentSheet
      - package: StripePaymentSheet
        product: StripePayments

  HeavensBoutiqueUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HeavensBoutiqueUITests
    dependencies:
      - target: HeavensBoutique
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 4SQJ3AH62S
        PRODUCT_BUNDLE_IDENTIFIER: com.heavensboutique.app.uitests
        PRODUCT_NAME: HeavensBoutiqueUITests
        SWIFT_STRICT_CONCURRENCY: minimal

schemes:
  HeavensBoutique:
    build:
      targets:
        HeavensBoutique: all
    test:
      targets:
        - HeavensBoutiqueUITests

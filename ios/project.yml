name: HeavensBoutique
options:
  bundleIdPrefix: com.heavensboutique
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  StripePaymentSheet:
    url: https://github.com/stripe/stripe-ios-spm
    from: 24.0.0

targets:
  HeavensBoutique:
    type: application
    platform: iOS
    sources:
      - path: HeavensBoutique
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heavensboutique.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_STRICT_CONCURRENCY: minimal
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
    info:
      path: HeavensBoutique/Info.plist
      properties:
        CFBundleDisplayName: Heaven's Boutique
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
        NSPhotoLibraryUsageDescription: Attach photos when messaging the boutique.
        NSCameraUsageDescription: Take photos to send in chat.
        API_BASE_URL: https://YOUR_VERCEL_PROJECT.vercel.app/api
        STRIPE_PUBLISHABLE_KEY: pk_test_REPLACE_ME
    dependencies:
      - package: StripePaymentSheet
        product: StripePaymentSheet
      - package: StripePaymentSheet
        product: StripePayments

schemes:
  HeavensBoutique:
    build:
      targets:
        HeavensBoutique: all
